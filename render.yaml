services:
  - name: pharmacy-pos-backend
    type: web
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm install --prefix backend
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-pos-db
          property: connectionString

  - name: pharmacy-pos-frontend
    type: web
    runtime: static
    plan: starter
    branch: main
    buildCommand: npm install --prefix frontend && npm --prefix frontend run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: pharmacy-pos-db
    databaseName: pharmacy_pos
    plan: starter